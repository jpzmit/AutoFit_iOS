<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Measurement (iOS Optimized)</title>
    <!-- Modern importmap structure for clean dependency resolution -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container"></div>

    <!-- Centered startup action -->
    <button id="startButton">Start AR Measurement</button>

    <!-- Environmental Scanning Onboarding for non-LiDAR tracking -->
    <div id="scanning-ui" class="hidden">
        <p class="scan-title">Scanning Environment...</p>
        <p class="scan-subtitle">Please move your phone slowly to map nearby surfaces.</p>
        <div id="scan-countdown">10</div>
    </div>

    <!-- Measurement Information Display -->
    <div id="ui" class="hidden">
        <div id="info">Point at a surface and tap to start measuring</div>
    </div>

    <!-- Central visual indicator for targeting -->
    <div id="center-crosshair" class="hidden">
        <div class="crosshair-x"></div>
        <div class="crosshair-y"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
